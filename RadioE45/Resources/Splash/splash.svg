<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Outer black circle -->
  <circle cx="250" cy="250" r="248" fill="#111111"/>

  <!-- Dark gray ring -->
  <circle cx="250" cy="250" r="235" fill="#3a3a3a"/>

  <!-- Gold/bronze flat disc -->
  <circle cx="250" cy="250" r="220" fill="#C8972A"/>

  <!-- Headphones + mic icon at top -->
  <g transform="translate(250, 82)" fill="white">
    <!-- Left ear cup -->
    <rect x="-22" y="8" width="10" height="16" rx="4" ry="4"/>
    <!-- Right ear cup -->
    <rect x="12" y="8" width="10" height="16" rx="4" ry="4"/>
    <!-- Headband arc -->
    <path d="M-17,12 Q0,-10 17,12" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <!-- Mic body -->
    <rect x="-5" y="18" width="10" height="14" rx="4" ry="4" fill="white"/>
    <!-- Mic stand -->
    <line x1="0" y1="32" x2="0" y2="40" stroke="white" stroke-width="2.5"/>
    <path d="M-7,40 Q0,46 7,40" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Black rounded rectangle for "RADIO" -->
  <rect x="105" y="135" width="290" height="140" rx="22" ry="22" fill="#111111"/>

  <!-- RADIO text — centered in box (y=135, h=140 → center=205) -->
  <text x="250" y="205"
        font-family="Arial Black, Impact, sans-serif"
        font-size="74"
        font-weight="900"
        fill="white"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="-2">RADIO</text>

  <!-- White rounded rectangle for "E45" -->
  <rect x="120" y="258" width="260" height="88" rx="18" ry="18" fill="#f0f0f0"/>

  <!-- E45 text — centered in box (y=258, h=88 → center=294 adjusted up), with border -->
  <text x="250" y="302"
        font-family="Arial Black, Impact, sans-serif"
        font-size="72"
        font-weight="900"
        fill="#e0479e"
        stroke="#7a1a5e"
        stroke-width="3"
        paint-order="stroke"
        text-anchor="middle"
        dominant-baseline="central"
        letter-spacing="2">E45</text>

  <!-- LA NUOVA ERA curved text at bottom with black border -->
  <path id="bottomArc" d="M 75,310 A 185,185 0 0,0 425,310" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="26" font-weight="700"
        fill="#4ECDC4" stroke="#111111" stroke-width="3" paint-order="stroke" letter-spacing="6">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">LA NUOVA ERA</textPath>
  </text>
</svg>
